name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x64

    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
      MR_KIT_ALLOW_UNSIGNED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies
        run: npm ci

      - name: Import Apple certificate
        if: env.MR_KIT_ALLOW_UNSIGNED != '1' && env.APPLE_CERTIFICATE != ''
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build app
        run: npm run build -- --target ${{ matrix.target }} --no-sign

      - name: Prepare release asset
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets
          dmg="$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit 2>/dev/null)"
          if [ -z "$dmg" ]; then
            echo "No dmg bundle found" >&2
            exit 1
          fi
          cp "$dmg" "release-assets/MR-Kit_${version}_${{ matrix.arch }}.dmg"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.dmg
          generate_release_notes: true
