name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clear-release-assets:
    name: Clear existing release assets
    runs-on: ubuntu-latest
    steps:
      - name: Delete old dmg assets
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: context.ref.replace('refs/tags/', ''),
              });
              for (const asset of release.data.assets) {
                if (/^MR-Kit_.*_(aarch64|x64)\.dmg$/.test(asset.name)) {
                  await github.rest.repos.deleteReleaseAsset({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    asset_id: asset.id,
                  });
                }
              }
            } catch (error) {
              if (error.status !== 404) throw error;
            }

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    needs: clear-release-assets
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x64

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies
        run: npm ci

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD secrets are required for signed macOS releases." >&2
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

          identity="$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$identity" ]; then
            echo "No Developer ID Application signing identity found in APPLE_CERTIFICATE." >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Build app
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID secrets are required for notarization." >&2
            exit 1
          fi
          npm run build -- --target ${{ matrix.target }}

      - name: Verify signed and notarized app
        run: |
          app="$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos src-tauri/target/release/bundle/macos -name 'MR Kit.app' -print -quit 2>/dev/null)"
          dmg="$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit 2>/dev/null)"

          if [ -z "$app" ] || [ -z "$dmg" ]; then
            echo "No app or dmg bundle found" >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app"
          spctl -a -vv -t exec "$app"
          xcrun stapler validate "$app"
          xcrun stapler validate "$dmg"

      - name: Prepare release asset
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets
          dmg="$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit 2>/dev/null)"
          if [ -z "$dmg" ]; then
            echo "No dmg bundle found" >&2
            exit 1
          fi
          cp "$dmg" "release-assets/MR-Kit_${version}_${{ matrix.arch }}.dmg"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.dmg
          generate_release_notes: true
