name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64

    env:
      MR_KIT_ADHOC_SIGN: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: |
          npm run build -- --target ${{ matrix.target }}

      - name: Verify signed app
        run: |
          app="$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos src-tauri/target/release/bundle/macos -name 'MR Kit.app' -print -quit 2>/dev/null)"
          dmg="$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit 2>/dev/null)"

          if [ -z "$app" ] || [ -z "$dmg" ]; then
            echo "No app or dmg bundle found" >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app"

      - name: Prepare release asset
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets
          dmg="$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit 2>/dev/null)"
          if [ -z "$dmg" ]; then
            echo "No dmg bundle found" >&2
            exit 1
          fi
          cp "$dmg" "release-assets/MR-Kit_${version}_${{ matrix.arch }}.dmg"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-dmg-${{ matrix.arch }}
          path: release-assets/*.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-dmg-*
          path: release-assets
          merge-multiple: true

      - name: Delete old dmg assets
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: context.ref.replace('refs/tags/', ''),
              });
              for (const asset of release.data.assets) {
                if (/^MR-Kit_.*_aarch64\.dmg$/.test(asset.name)) {
                  await github.rest.repos.deleteReleaseAsset({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    asset_id: asset.id,
                  });
                }
              }
            } catch (error) {
              if (error.status !== 404) throw error;
            }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.dmg
          generate_release_notes: true

      # cask 版本号必须在 dmg 挂上 Release 之后才更新，
      # 否则 brew update 会在安装包就绪前提示客户端升级（下载 404）
      - name: Bump Homebrew cask version
        run: |
          version="${GITHUB_REF_NAME#v}"
          sed -i -E "s/^  version \".*\"$/  version \"${version}\"/" Casks/mr-kit.rb
          if git diff --quiet Casks/mr-kit.rb; then
            echo "Cask already at ${version}, nothing to bump"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/mr-kit.rb
          git commit -m "Bump cask to ${version}"
          git pull --rebase origin main
          git push origin main
